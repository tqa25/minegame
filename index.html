<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#17221d" />
    <title>Minegame Iso</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js"
      }
    }
    </script>
    <main id="app">
      <canvas id="game" aria-label="Minegame isometric voxel world"></canvas>

      <section class="hud hud-top" aria-label="Game status">
        <div class="brand">Minegame Iso</div>
        <div class="status-grid">
          <div class="status">
            <span id="classLabel">Class: Warrior</span>
            <span id="weaponLabel">Weapon: Iron Sword</span>
            <span id="levelLabel">Lv 1</span>
          </div>
          <div class="status">
            <span id="healthLabel">HP 100/100</span>
            <span id="experienceLabel">XP 0/30</span>
            <span id="enemyLabel">Enemy 0</span>
          </div>
          <div class="status">
            <span id="blockLabel">Grass</span>
            <span id="heightLabel">H: 0</span>
            <span id="attackCooldownLabel">Attack Ready</span>
            <span id="skillCooldownLabel">Dash Ready</span>
          </div>
        </div>
      </section>

      <section class="hud tools" aria-label="Block tools">
        <button class="tool active" data-block="grass" type="button">Grass</button>
        <button class="tool" data-block="dirt" type="button">Dirt</button>
        <button class="tool" data-block="stone" type="button">Stone</button>
        <button class="tool" data-block="wood" type="button">Wood</button>
      </section>

      <section class="hud zoom-controls" aria-label="Camera zoom">
        <button id="zoomOutBtn" class="zoom-button" type="button" aria-label="Zoom out">-</button>
        <span id="zoomLabel" class="zoom-level">6.4</span>
        <button id="zoomInBtn" class="zoom-button" type="button" aria-label="Zoom in">+</button>
      </section>

      <section class="touch-layer" aria-label="Touch controls">
        <div id="joystick" class="joystick" aria-hidden="true">
          <div id="stick" class="stick"></div>
        </div>
        <div class="actions">
          <button id="attackBtn" class="action primary attack" type="button">Attack</button>
          <button id="skillBtn" class="action skill" type="button">Dash Slash</button>
          <button id="digBtn" class="action" type="button">Dig</button>
          <button id="buildBtn" class="action" type="button">Build</button>
          <button id="jumpBtn" class="action" type="button">Hop</button>
        </div>
      </section>
    </main>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
